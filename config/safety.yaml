command_whitelist:
  - "echo"
  - "dir"
  - "ls"
  - "pwd"
  - "python"
  - "pip"
  - "uv"
  - "git"
  - "cat"
  - "type"
  - "find"
  - "grep"

forbidden_imports:
  - "os"
  - "subprocess"
  - "sys"
  - "shutil"
  - "ctypes"
  - "winreg"
  - "socket"

rate_limits:
  shell_tool: 30
  file_tool: 60
  email_tool: 5
  browser_tool: 10
  python_tool: 20
  web_search_tool: 20
